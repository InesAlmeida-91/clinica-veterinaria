{% extends "base.html" %}
{% block content %}
<div class="mx-auto w-full max-w-md rounded-lg bg-white p-6 shadow-md">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">Login</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Username</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" type="text" name="username" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Password</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" type="password" name="password" required>
    </div>
    <button class="w-full rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 transition" type="submit">Entrar</button>
  </form>
</div>
{% endblock %}
