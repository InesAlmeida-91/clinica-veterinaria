{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-orange-950 mb-4">Adicionar novo animal</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Nome</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="nome" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Espécie</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="especie" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Raça</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="raca">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Data de nascimento</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="date" name="data_nascimento" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Dono</label>
      <select class="w-full rounded border border-amber-300 px-3 py-2" name="id_dono" required>
        <option value="">Selecione um dono</option>
        {% for d in donos %}
        <option value="{{ d[0] }}">{{ d[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="rounded bg-orange-500 px-4 py-2 text-white hover:bg-orange-600 transition" type="submit">Guardar</button>
  </form>
</div>
{% endblock %}
