{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">Novo animal</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Nome</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="nome" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Espécie</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="especie" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Raça</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="raca">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Data de nascimento (YYYY-MM-DD)</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="data_nascimento" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">ID Dono</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="number" name="id_dono" required>
    </div>
    <button class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 transition" type="submit">Guardar</button>
  </form>
  <p class="mt-3 text-sm text-slate-600">Consulta os IDs de donos em <a class="text-blue-600 hover:text-blue-800" href="{{ url_for('donos') }}">Donos</a>.</p>
</div>
{% endblock %}
