{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-orange-950 mb-4">Tratamentos da consulta {{ consulta.id_consulta }} — Animal: {{ consulta.nome_animal }}</h2>
  {% if consulta %}
  <p class="text-sm text-orange-800 mb-3">Animal: {{ consulta[5] }}, Veterinário: {{ consulta[6] }}</p>
  {% endif %}

  <h3 class="mb-2 text-lg font-medium text-orange-900">Adicionar tratamento</h3>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Tratamento</label>
      <select class="w-full rounded border border-amber-300 px-3 py-2" name="id_tratamento">
        {% for t in tratamentos %}
          <option value="{{ t[0] }}">{{ t[1] }} ({{ t[2] }}€)</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Quantidade</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="number" name="quantidade" min="1" value="1" required>
    </div>
    <button class="rounded bg-orange-500 px-4 py-2 text-white hover:bg-orange-600 transition" type="submit">Adicionar</button>
  </form>

  <p class="mt-4"><a class="text-orange-600 hover:text-orange-800" href="{{ url_for('consultas') }}">Voltar às consultas</a></p>
</div>
{% endblock %}
