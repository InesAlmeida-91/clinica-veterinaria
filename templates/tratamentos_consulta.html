{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">Tratamentos da consulta {{ id_consulta }}</h2>

  <h3 class="mb-2 text-lg font-medium text-slate-700">Adicionar tratamento</h3>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Tratamento</label>
      <select class="w-full rounded border border-slate-300 px-3 py-2" name="id_tratamento">
        {% for t in tratamentos %}
          <option value="{{ t[0] }}">{{ t[0] }} - {{ t[1] }} ({{ t[2] }}€)</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Quantidade</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="number" name="quantidade" min="1" value="1" required>
    </div>
    <button class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 transition" type="submit">Adicionar</button>
  </form>

  <p class="mt-4"><a class="text-blue-600 hover:text-blue-800" href="{{ url_for('consultas') }}">Voltar às consultas</a></p>
</div>
{% endblock %}
