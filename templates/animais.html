{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-2xl font-semibold text-slate-800">Animais</h2>
  <a class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 transition" href="{{ url_for('novo_animal') }}">Novo animal</a>
</div>
<div class="overflow-x-auto rounded-lg border bg-white shadow-sm">
  <table class="min-w-full divide-y divide-slate-200">
    <thead class="bg-slate-50">
      <tr>
        <th class="px-4 py-2 text-left text-sm font-medium text-slate-600">ID</th>
        <th class="px-4 py-2 text-left text-sm font-medium text-slate-600">Animal</th>
        <th class="px-4 py-2 text-left text-sm font-medium text-slate-600">Dono</th>
        <th class="px-4 py-2 text-left text-sm font-medium text-slate-600">Ações</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      {% for a in animais %}
      <tr class="hover:bg-slate-50">
        <td class="px-4 py-2 text-sm text-slate-700">{{ a[0] }}</td>
        <td class="px-4 py-2 text-sm text-slate-700">{{ a[1] }}</td>
        <td class="px-4 py-2 text-sm text-slate-700">{{ a[2] }}</td>
        <td class="px-4 py-2 text-sm text-slate-700 space-x-2">
          <a class="text-blue-600 hover:text-blue-800" href="{{ url_for('historico_animal', id_animal=a[0]) }}">Histórico</a>
          <form action="{{ url_for('arquivar_animal_route', id_animal=a[0]) }}" method="post" class="inline">
            <button class="rounded bg-rose-500 px-3 py-1 text-white hover:bg-rose-600 transition" type="submit" onclick="return confirm('Arquivar animal?')">Arquivar</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
