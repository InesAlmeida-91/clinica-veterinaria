{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">Editar dono</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Nome</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="nome" value="{{ dono[1] }}" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">NIF</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="nif" value="{{ dono[2] }}">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Telefone</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="text" name="telefone" value="{{ dono[3] }}">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Email</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2" type="email" name="email" value="{{ dono[4] }}">
    </div>
    <div class="flex gap-2">
      <button class="rounded bg-green-600 px-4 py-2 text-white hover:bg-green-700 transition" type="submit">Guardar alterações</button>
      <a class="rounded bg-slate-200 px-4 py-2 text-slate-700 hover:bg-slate-300 transition" href="{{ url_for('donos') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
