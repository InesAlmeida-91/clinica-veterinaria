{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-orange-950 mb-4">Editar dono</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Nome</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="nome" value="{{ dono[1] }}" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">NIF</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="nif" value="{{ dono[2] }}">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Telefone</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="telefone" value="{{ dono[3] }}">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Email</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="email" name="email" value="{{ dono[4] }}">
    </div>
    <div class="flex gap-2">
      <button class="rounded bg-orange-500 px-4 py-2 text-white hover:bg-orange-600 transition" type="submit">Guardar alterações</button>
      <a class="rounded bg-amber-200 px-4 py-2 text-orange-900 hover:bg-amber-300 transition" href="{{ url_for('donos') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
