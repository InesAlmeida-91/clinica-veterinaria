{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">Nova consulta</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Data (YYYY-MM-DD HH:MM:SS)</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" type="text" name="data_consulta" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-600">Motivo</label>
      <input class="w-full rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" type="text" name="motivo" required>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">ID Animal</label>
        <input class="w-full rounded border border-slate-300 px-3 py-2" type="number" name="id_animal" required>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">ID Veterinário</label>
        <input class="w-full rounded border border-slate-300 px-3 py-2" type="number" name="id_vet" required>
      </div>
    </div>
    <button class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700 transition" type="submit">Marcar</button>
  </form>
  <p class="mt-3 text-sm text-slate-600">Consulta os IDs de animais em <a class="text-blue-600 hover:text-blue-800" href="{{ url_for('animais') }}">Animais</a>.</p>
</div>
{% endblock %}
