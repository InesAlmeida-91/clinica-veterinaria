{% extends "base.html" %}
{% block content %}
<div class="rounded-lg bg-white p-6 shadow-sm">
  <h2 class="text-2xl font-semibold text-orange-950 mb-4">Adicionar novo dono</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Nome</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="nome" required>
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">NIF</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="nif">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Telefone</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="text" name="telefone">
    </div>
    <div>
      <label class="mb-1 block text-sm font-medium text-orange-800">Email</label>
      <input class="w-full rounded border border-amber-300 px-3 py-2" type="email" name="email">
    </div>
    <button class="rounded bg-orange-500 px-4 py-2 text-white hover:bg-orange-600 transition" type="submit">Guardar</button>
  </form>
</div>
{% endblock %}
